name: Production API Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  language-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Language detection tests
        run: npx tsx scripts/test-language-detection.ts

  production-smoke:
    runs-on: ubuntu-latest
    needs: language-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Production API smoke test
        env:
          AGRO_API_KEY: ${{ secrets.AGRO_API_KEY }}
          API_BASE_URL: https://ai-agranom.vercel.app
        run: node scripts/production-api-smoke.js
